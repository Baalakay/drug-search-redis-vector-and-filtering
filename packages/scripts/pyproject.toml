[project]
name = "DAW-scripts"
version = "1.0.0"
description = "Utility scripts for DAW"
requires-python = ">=3.12"
dependencies = [
    "boto3>=1.34.131",
    "psycopg2-binary>=2.9.10",
    "DAW-core",
]

[tool.uv.sources]
DAW-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

